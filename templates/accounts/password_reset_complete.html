{% extends 'base.html' %}

{% block title %}Password Reset Complete - Watch House{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="auth-card">
        <div class="card">
            <div class="card-body p-4 p-md-5 text-center">
                <div class="auth-icon"><i class="fas fa-circle-check"></i></div>
                <h2 class="mb-2">Password Reset Complete</h2>
                <p class="text-muted mb-4">
                    Your password has been reset successfully.
                    You can now log in with your new password.
                </p>
                <a href="{% url 'accounts:login' %}" class="btn btn-primary">
                    <i class="fas fa-right-to-bracket me-1"></i> Log In Now
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
